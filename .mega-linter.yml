---
ENABLE:
  - ACTION
  - CSS
  - JAVASCRIPT
  - JSON
  - MARKDOWN
  - PHP
  - REPOSITORY
  - YAML

ENABLE_LINTERS:
  - JAVASCRIPT_ES

DISABLE:
  - COPYPASTE
  - SPELL

DISABLE_LINTERS:
  # GitHub Actions security scanning is owned by the dedicated, org-shared
  # zizmor workflow (.github/workflows/zizmor.yml, EUDCH/.github reusable),
  # which is tuned and runs with API access. Disable MegaLinter's bundled
  # copy to avoid a second, differently-configured zizmor scan.
  - ACTION_ZIZMOR
  - JAVASCRIPT_STANDARD
  - JSON_NPM_PACKAGE_JSON_LINT
  - PHP_PSALM
  - PHP_PHPCSFIXER
  - REPOSITORY_DEVSKIM

ADDITIONAL_EXCLUDED_DIRECTORIES:
  - vendor/
  - core/

PHP_PHPSTAN_PRE_COMMANDS:
  - command: composer install --no-interaction --no-progress --ignore-platform-reqs
    cwd: workspace
PHP_PHPSTAN_CLI_EXECUTABLE:
  - "/github/workspace/vendor/bin/phpstan"
PHP_PHPSTAN_DISABLE_ERRORS: true

PHP_PHPCS_PRE_COMMANDS:
  - command: composer install --no-interaction --no-progress --ignore-platform-reqs
    cwd: workspace
PHP_PHPCS_COMMAND_REMOVE_ARGUMENTS: "--standard=/action/lib/.automation/phpcs.xml"
PHP_PHPCS_ARGUMENTS:
  - "--standard=Drupal,DrupalPractice"
  - "--ignore=vendor/,core/"
PHP_PHPCS_CLI_EXECUTABLE:
  - "/github/workspace/vendor/bin/phpcs"
PHP_PHPCS_DISABLE_ERRORS: true

REPOSITORY_CHECKOV_ARGUMENTS: "--skip-path 'vendor/*'"

REPOSITORY_KICS_ARGUMENTS: "--exclude-paths core/ --exclude-paths vendor/"

REPOSITORY_KINGFISHER_ARGUMENTS: "--exclude core/ --exclude vendor/"

REPOSITORY_OSV_SCANNER_ARGUMENTS: "--allow-no-lockfiles"

# dustilock is a project-mode scanner: MegaLinter's own filters
# (FILTER_REGEX_EXCLUDE / ADDITIONAL_EXCLUDED_DIRECTORIES) do not apply to it,
# and dustilock has no ignore file or --exclude flag (only -r and -p). When
# run with --recursive it walks the composer-installed Drupal core/ and
# vendor/ and fails on a core test fixture
# (core/modules/system/tests/fixtures/HtaccessTest/package.json), not on our
# code. Dropping --recursive scopes it to the repo's
# own top-level package.json (the only first-party package file), which keeps
# the dependency-confusion check on what we actually ship.
REPOSITORY_DUSTILOCK_COMMAND_REMOVE_ARGUMENTS: "--recursive"
