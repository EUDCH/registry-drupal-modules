---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    # One-day cooldown so a same-day yanked or compromised action release
    # (tj-actions / Shai-Hulud style) is not applied automatically. Security
    # fixes come through GitHub's advisory feed separately and are not held by
    # this cooldown. Matches the OPERAS Renovate release-age setting.
    cooldown:
      default-days: 1
